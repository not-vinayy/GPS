name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Releases
  pull-requests: write  # needed to comment on PRs

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # Gradle cache — dramatically speeds up subsequent builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}

      # Add the Android platform if it hasn't been committed to the repo
      - name: Initialize Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "➕ Adding Android platform…"
            npx cap add android
          else
            echo "✅ Android platform already present."
          fi

      # Inject GPS + foreground-service permissions into the manifest
      - name: Patch AndroidManifest.xml
        run: bash scripts/patch-manifest.sh

      # Generate adaptive icon PNGs (mipmap-*) from assets/icon-only.svg + icon-foreground/background
      - name: Generate Android icons
        run: npx @capacitor/assets generate --android

      # Copy web build into the native project & install plugin native deps
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'

      # Keep the APK for 30 days (both branches and PRs)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trace-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # Drop a download link comment on every PR
      - name: Comment APK link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 📱 Android APK Ready',
                '',
                `**Build #${{ github.run_number }}** completed successfully on \`${context.payload.pull_request.head.ref}\`.`,
                '',
                `[⬇️ Download APK](${runUrl}) — artifact expires in 30 days.`,
                '',
                '> Enable *Install from unknown sources* on your device before installing.',
              ].join('\n'),
            });

  # ── 2. Release (main branch only) ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: trace-debug-${{ github.run_number }}

      - name: Rename APK for release
        run: mv app-debug.apk "trace-build-${{ github.run_number }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Trace · Build #${{ github.run_number }}"
          prerelease: true
          generate_release_notes: false
          files: "trace-build-${{ github.run_number }}.apk"
          body: |
            ## 📱 Trace — Debug Build #${{ github.run_number }}

            Automated build from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Install
            1. Download the `.apk` file below
            2. On your Android device → **Settings → Install unknown apps** → allow your browser/Files app
            3. Open the APK to install

            > This is a debug build signed with the default debug keystore. For a production release, configure release signing in the workflow.
